name: Socket Security

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: Socket dependency review
    runs-on: ubuntu-latest
    if: ${{ env.SOCKET_SECURITY_API_KEY != '' }}
    env:
      SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: SocketDev/socket-security-action@v0
        with:
          api-token: ${{ secrets.SOCKET_SECURITY_API_KEY }}
