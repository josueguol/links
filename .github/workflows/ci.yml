name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'
  COVERAGE_THRESHOLD: 40

jobs:
  backend:
    name: Backend (build + test + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore (locked)
        run: dotnet restore Links.slnx --locked-mode

      - name: Verify formatting
        run: dotnet format Links.slnx --verify-no-changes --no-restore

      - name: Build (warnings as errors)
        run: dotnet build Links.slnx --no-restore --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Test with coverage
        run: |
          dotnet test Links.slnx \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.1
        with:
          reports: 'coverage/**/coverage.cobertura.xml'
          targetdir: 'coverage/report'
          reporttypes: 'Cobertura;MarkdownSummaryGithub'

      - name: Enforce coverage threshold (>= ${{ env.COVERAGE_THRESHOLD }}%)
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/report/Cobertura.xml
          badge: false
          format: markdown
          output: console
          thresholds: '${{ env.COVERAGE_THRESHOLD }} ${{ env.COVERAGE_THRESHOLD }}'
          fail_below_min: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/

      - name: Vulnerable NuGet packages
        run: |
          set +e
          dotnet list Links.slnx package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          grep -q -E "(High|Critical)" vuln.txt && { echo "::error::Vulnerabilidades HIGH/CRITICAL en dependencias NuGet"; exit 1; } || echo "Sin vulnerabilidades HIGH/CRITICAL"

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: npm audit (HIGH/CRITICAL)
        run: npm audit --audit-level=high

  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install commitlint
        run: npm ci

      - name: Validate commits in PR
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
